<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERSUS • Operator Training</title>
    <meta name="description" content="Cold operator training simulation. No safety net.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A26F;
            --gold-bright: #E8D5A3;
            --bg: #000000;
            --text: #E8E8E8;
            --text-dim: #777777;
            --danger: #B84C3F;
            --success: #4A7C59;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            overflow: hidden;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(255,255,255,0.03) 2px,
                rgba(255,255,255,0.03) 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* BOOT SEQUENCE - This is the new heart */
        #boot {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .boot-inner {
            width: 100%;
            max-width: 720px;
            padding: 40px 24px;
        }

        .boot-header {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .boot-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            letter-spacing: 6px;
            margin-bottom: 48px;
            color: var(--gold-bright);
        }

        .boot-log {
            font-size: 14px;
            line-height: 1.9;
            color: #aaa;
            min-height: 280px;
        }

        .boot-log .line {
            margin-bottom: 4px;
            opacity: 0;
            animation: bootLine 0.6s forwards;
        }

        .boot-log .line.done {
            color: var(--gold);
        }

        .boot-log .line.warning {
            color: #B84C3F;
        }

        .boot-status {
            margin-top: 60px;
            font-size: 12px;
            letter-spacing: 2px;
            color: #555;
        }

        .boot-progress {
            height: 1px;
            background: #222;
            margin-top: 12px;
            position: relative;
        }

        .boot-progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes bootLine {
            to { opacity: 1; }
        }

        /* Main Experience */
        #main {
            display: none;
            padding-top: 60px;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .exit {
            font-size: 12px;
            color: #555;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .exit:hover { color: var(--gold); }

        .cinematic-title {
            text-align: center;
            padding: 80px 20px 60px;
        }

        .sim-label {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--gold);
            margin-bottom: 16px;
        }

        .main-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(52px, 8vw, 92px);
            font-weight: 700;
            letter-spacing: -4.5px;
            line-height: 0.9;
            margin-bottom: 24px;
        }

        .main-subtitle {
            font-size: 15px;
            color: #888;
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .enter-btn {
            margin-top: 48px;
            display: inline-block;
            background: var(--gold);
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            padding: 14px 42px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .enter-btn:hover {
            background: var(--gold-bright);
            transform: translateY(-1px);
        }

        /* Opponent Selection - More premium */
        .briefing {
            padding: 40px 0 100px;
            display: none;
        }

        .briefing-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .briefing-header .label {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--gold);
        }

        .dossier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .dossier {
            border: 1px solid #1a1a1a;
            padding: 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #0a0a0a;
        }

        .dossier:hover {
            border-color: var(--gold);
            background: #111;
        }

        .dossier-icon {
            font-size: 28px;
            margin-bottom: 20px;
            display: block;
        }

        .dossier-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .dossier-role {
            font-size: 12px;
            color: #666;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .dossier-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #999;
        }

        /* Battle - More cinematic */
        #battle {
            display: none;
            padding: 40px 0;
        }

        .arena-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #111;
        }

        .arena-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #444;
        }

        .pressure {
            display: flex;
            gap: 40px;
            margin-bottom: 32px;
        }

        .meter {
            flex: 1;
        }

        .meter-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 8px;
        }

        .meter-bar {
            height: 3px;
            background: #1a1a1a;
            position: relative;
        }

        .meter-fill {
            position: absolute;
            height: 100%;
            background: var(--gold);
            transition: width 0.5s ease;
        }

        .question-block {
            background: #0a0a0a;
            border: 1px solid #1f1f1f;
            padding: 32px 36px;
            margin-bottom: 28px;
            font-size: 17px;
            line-height: 1.5;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option {
            background: #111;
            border: 1px solid #222;
            padding: 18px 22px;
            font-size: 14px;
            cursor: pointer;
            line-height: 1.5;
            transition: all 0.15s ease;
        }

        .option:hover {
            border-color: var(--gold);
            color: var(--gold-bright);
        }

        .log {
            margin-top: 32px;
            font-size: 12px;
            color: #444;
            line-height: 1.8;
            max-height: 140px;
            overflow-y: auto;
            padding-right: 20px;
        }

        .result {
            display: none;
            text-align: center;
            padding: 80px 20px;
        }

        .result-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
        }

        .result-score {
            font-size: 68px;
            font-weight: 700;
            color: var(--gold-bright);
            margin-bottom: 40px;
            letter-spacing: -3px;
        }
    </style>
</head>
<body>

    <!-- CINEMATIC BOOT SEQUENCE -->
    <div id="boot">
        <div class="boot-inner">
            <div class="boot-header">BASIN • OPERATOR TRAINING DIVISION</div>
            <div class="boot-title">SIM-01 // VERSUS PROTOCOL</div>

            <div class="boot-log" id="boot-log"></div>

            <div class="boot-status">
                SYSTEM INTEGRITY <span id="boot-percent">00</span>%
                <div class="boot-progress">
                    <div class="boot-progress-bar" id="boot-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN EXPERIENCE -->
    <div id="main">
        <div class="topbar">
            <div class="brand">BASIN • OPERATOR TRAINING</div>
            <div class="exit" onclick="location.reload()">EXIT SIM</div>
        </div>

        <div class="container">
            <!-- Title -->
            <div class="cinematic-title">
                <div class="sim-label">SIM-01</div>
                <h1 class="main-title">VERSUS</h1>
                <p class="main-subtitle">
                    You are not here to win.<br>
                    You are here to survive the pressure.
                </p>
                <div onclick="enterBriefing()" class="enter-btn">ENTER THE CRUCIBLE</div>
            </div>

            <!-- Briefing / Opponent Selection -->
            <div id="briefing" class="briefing">
                <div class="briefing-header">
                    <div class="label">TARGET DOSSIERS LOADED</div>
                </div>
                <div class="dossier-grid" id="dossier-grid"></div>
            </div>

            <!-- Battle -->
            <div id="battle">
                <div class="container">
                    <div class="arena-header">
                        <div>
                            <div class="arena-label" id="battle-opponent"></div>
                        </div>
                        <div class="arena-label">ROUND <span id="round-num">1</span></div>
                    </div>

                    <div class="pressure">
                        <div class="meter">
                            <div class="meter-label">YOUR COMPOSURE</div>
                            <div class="meter-bar"><div class="meter-fill" id="composure-bar" style="width:100%"></div></div>
                        </div>
                        <div class="meter">
                            <div class="meter-label">OPPONENT PRESSURE</div>
                            <div class="meter-bar"><div class="meter-fill" id="pressure-bar" style="width:35%"></div></div>
                        </div>
                    </div>

                    <div class="question-block" id="question-text"></div>

                    <div class="options" id="options"></div>

                    <div class="log" id="battle-log"></div>
                </div>
            </div>

            <!-- Result -->
            <div id="result" class="result">
                <div class="result-title" id="result-title"></div>
                <div class="result-score" id="final-score"></div>
                <div style="display:flex; gap:12px; justify-content:center;">
                    <button onclick="restartCurrent()" style="background:#222; color:#ccc; border:none; padding:14px 32px; cursor:pointer;">RUN IT AGAIN</button>
                    <button onclick="location.reload()" style="background:transparent; color:#666; border:1px solid #222; padding:14px 32px; cursor:pointer;">EXIT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CINEMATIC BOOT SEQUENCE ====================
        const bootLines = [
            { text: "INITIALIZING NEURAL INTERFACE...", delay: 420 },
            { text: "Loading executive archetype models...", delay: 680 },
            { text: "Calibrating threat assessment matrix...", delay: 820 },
            { text: "Injecting real-world pressure vectors", delay: 950, warning: false },
            { text: "WARNING: No safety net enabled", delay: 1100, warning: true },
            { text: "Syncing operator biometric baseline...", delay: 780 },
            { text: "All systems nominal.", delay: 650 },
            { text: "Simulation integrity verified.", delay: 580, done: true },
        ];

        function runBootSequence() {
            const log = document.getElementById('boot-log');
            const bar = document.getElementById('boot-bar');
            const percent = document.getElementById('boot-percent');

            let progress = 0;

            bootLines.forEach((line, index) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'line' + (line.warning ? ' warning' : '') + (line.done ? ' done' : '');
                    el.textContent = line.text;
                    log.appendChild(el);

                    progress = Math.floor(((index + 1) / bootLines.length) * 100);
                    bar.style.width = progress + '%';
                    percent.textContent = progress.toString().padStart(2, '0');

                    if (index === bootLines.length - 1) {
                        setTimeout(() => {
                            document.getElementById('boot').style.transition = 'opacity 0.6s ease';
                            document.getElementById('boot').style.opacity = '0';
                            setTimeout(() => {
                                document.getElementById('boot').style.display = 'none';
                                document.getElementById('main').style.display = 'block';
                            }, 650);
                        }, 1400);
                    }
                }, line.delay + (index * 380));
            });
        }

        // ==================== GAME DATA ====================
        const OPPONENTS = [
            {
                id: "cfo",
                icon: "📉",
                name: "MARCUS HALE",
                role: "CFO • SERIES D",
                desc: "Every number will be weaponized.",
                basePressure: 42,
            },
            {
                id: "ceo",
                icon: "🔥",
                name: "ELENA VOSS",
                role: "CEO & CO-FOUNDER",
                desc: "She sees through you in seconds.",
                basePressure: 55,
            },
            {
                id: "vps",
                icon: "⚔️",
                name: "DEREK KANE",
                role: "VP SALES • 200+ REPS",
                desc: "Old school. Smells weakness instantly.",
                basePressure: 48,
            },
            {
                id: "eng",
                icon: "🧠",
                name: "PRIYA SHARMA",
                role: "VP ENGINEERING",
                desc: "Precision strikes. No room for vagueness.",
                basePressure: 38,
            }
        ];

        let currentGame = null;

        function enterBriefing() {
            document.querySelector('.cinematic-title').style.display = 'none';
            document.getElementById('briefing').style.display = 'block';

            const grid = document.getElementById('dossier-grid');
            grid.innerHTML = '';

            OPPONENTS.forEach(opp => {
                const el = document.createElement('div');
                el.className = 'dossier';
                el.innerHTML = `
                    <div class="dossier-icon">${opp.icon}</div>
                    <div class="dossier-name">${opp.name}</div>
                    <div class="dossier-role">${opp.role}</div>
                    <div class="dossier-desc">${opp.desc}</div>
                `;
                el.onclick = () => startSimulation(opp);
                grid.appendChild(el);
            });
        }

        function startSimulation(opp) {
            document.getElementById('briefing').style.display = 'none';
            document.getElementById('battle').style.display = 'block';

            currentGame = {
                opponent: opp,
                composure: 100,
                pressure: opp.basePressure,
                round: 1,
                score: 0,
                log: []
            };

            document.getElementById('battle-opponent').innerHTML = `${opp.icon} ${opp.name} — ${opp.role}`;
            updateMeters();
            document.getElementById('battle-log').innerHTML = '';
            loadNextRound();
        }

        function updateMeters() {
            document.getElementById('composure-bar').style.width = currentGame.composure + '%';
            document.getElementById('pressure-bar').style.width = currentGame.pressure + '%';
            document.getElementById('round-num').textContent = currentGame.round;
        }

        function loadNextRound() {
            const game = currentGame;
            const q = getDynamicQuestion(game);

            document.getElementById('question-text').textContent = q.text;

            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt.text;
                btn.onclick = () => submitAnswer(opt, q);
                optionsEl.appendChild(btn);
            });
        }

        // This is where the game starts to EVOLVE
        function getDynamicQuestion(game) {
            const pressure = game.pressure;
            const composure = game.composure;

            // The simulation adapts based on state
            if (pressure > 75) {
                return {
                    text: "You’re starting to crack. Why should I believe anything you say right now?",
                    options: [
                        { text: "Because the data still holds. Let me walk you through the last three cohorts.", effect: { composure: -8, pressure: -12, score: 22 } },
                        { text: "I’ve been under more pressure than this and still delivered.", effect: { composure: -14, pressure: +6, score: 8 } },
                        { text: "I’m not cracking. I’m recalibrating in real time.", effect: { composure: +4, pressure: -18, score: 31 } }
                    ]
                };
            }

            if (composure < 45) {
                return {
                    text: "Your answers are getting shorter. Nervous?",
                    options: [
                        { text: "No. I’m being precise because every word matters here.", effect: { composure: +6, pressure: -9, score: 18 } },
                        { text: "I’m thinking before I speak. You should try it.", effect: { composure: -12, pressure: +14, score: -4 } },
                        { text: "The pressure is real. That’s why I’m measuring my words.", effect: { composure: +2, pressure: -6, score: 14 } }
                    ]
                };
            }

            // Default hard questions
            return {
                text: "Walk me through the single decision that moved the needle most in your last role.",
                options: [
                    { text: "I killed our bottom-funnel stage gate process and forced earlier buyer qualification.", effect: { composure: -3, pressure: -11, score: 26 } },
                    { text: "We rebuilt the outbound motion from first principles.", effect: { composure: -2, pressure: -8, score: 19 } },
                    { text: "I focused the team on the right ICP and stopped chasing noise.", effect: { composure: +1, pressure: -4, score: 11 } }
                ]
            };
        }

        function submitAnswer(option, question) {
            const game = currentGame;
            const log = document.getElementById('battle-log');

            // Apply effects
            game.composure = Math.max(0, Math.min(100, game.composure + option.effect.composure));
            game.pressure = Math.max(0, Math.min(100, game.pressure + option.effect.pressure));
            game.score += option.effect.score;

            addLogLine(log, `YOU: ${option.text}`);
            addLogLine(log, `→ ${option.effect.score > 20 ? 'STRONG' : option.effect.score > 10 ? 'SOLID' : 'RISKY'} (${option.effect.score > 0 ? '+' : ''}${option.effect.score})`, option.effect.score > 15 ? '#C5A26F' : '#666');

            updateMeters();

            if (game.composure <= 0) {
                setTimeout(() => endSimulation(false), 900);
                return;
            }

            if (game.pressure >= 100) {
                setTimeout(() => endSimulation(true), 900);
                return;
            }

            game.round++;
            setTimeout(() => {
                loadNextRound();
            }, 1350);
        }

        function addLogLine(container, text, color = '#555') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = text;
            container.appendChild(line);
            container.scrollTop = 999;
        }

        function endSimulation(won) {
            document.getElementById('battle').style.display = 'none';
            const result = document.getElementById('result');
            result.style.display = 'block';

            const game = currentGame;

            if (won) {
                document.getElementById('result-title').textContent = 'SIMULATION BROKEN';
                document.getElementById('result-title').style.color = 'var(--success)';
            } else {
                document.getElementById('result-title').textContent = 'OPERATOR ELIMINATED';
                document.getElementById('result-title').style.color = 'var(--danger)';
            }

            document.getElementById('final-score').textContent = game.score;
        }

        function restartCurrent() {
            document.getElementById('result').style.display = 'none';
            const opp = currentGame.opponent;
            startSimulation(opp);
        }

        // Boot the experience
        window.onload = function() {
            runBootSequence();
        };

        // Easter egg: press V during boot for faster sequence (dev)
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'v' && document.getElementById('boot').style.display !== 'none') {
                document.getElementById('boot').style.transition = 'none';
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot').style.display = 'none';
                    document.getElementById('main').style.display = 'block';
                }, 80);
            }
        });
    </script>
</body>
</html>
