<style>
  :root{--gold:#C8A951;--blood:#7a1f2b;--ink:#e7e2d6;--dim:#8f897b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:radial-gradient(1000px 500px at 50% -10%,rgba(122,31,43,.16),transparent 60%),linear-gradient(180deg,#07070b,#0b0a10 60%,#07070b);
    color:var(--ink);font-family:'EB Garamond',Georgia,serif;line-height:1.9;min-height:100vh;}
  .wrap{max-width:680px;margin:0 auto;padding:4.5rem 1.5rem 6rem;}
  .kick{font-family:'JetBrains Mono',monospace;color:var(--blood);font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;margin-bottom:1.3rem;}
  h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(2.1rem,6vw,3rem);line-height:1.1;color:#fff;letter-spacing:.02em;margin-bottom:1rem;}
  .meta{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:.75rem;letter-spacing:.06em;margin-bottom:.6rem;}
  .tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2.4rem;}
  .tags span{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(200,169,81,.32);border-radius:999px;padding:.24rem .55rem;}
  .rule{height:1px;background:linear-gradient(90deg,transparent,rgba(200,169,81,.5),transparent);margin:2.4rem 0;}
  article p{font-size:1.22rem;margin:0 0 1.5rem;color:#ded7c7;}
  article p:first-of-type::first-letter{font-family:'Cinzel',serif;font-size:3.4rem;line-height:1;float:left;padding:.1rem .6rem 0 0;color:var(--gold);}
  .sig{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:.82rem;margin-top:2.4rem;letter-spacing:.04em;}
  a{color:var(--gold);}
</style>
</head>
<body>
  <main class="wrap">
    <div class="kick">Silicon Valley Gothic</div>
    <article>
      <h1>TITLE</h1>
      <div class="meta">MONTH DD, YYYY &nbsp;•&nbsp; N min read</div>
