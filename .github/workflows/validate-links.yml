name: Validate Site Links

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'case-studies/**'
      - 'scripts/validate-blog-links.py'
      - '.github/workflows/validate-links.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'case-studies/**'
      - 'scripts/validate-blog-links.py'
      - '.github/workflows/validate-links.yml'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run link validator
        run: python3 scripts/validate-blog-links.py

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Site link validation found broken internal links. Please run `python3 scripts/validate-blog-links.py` locally to inspect the failures.'
            })
