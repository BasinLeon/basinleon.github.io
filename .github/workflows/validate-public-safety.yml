name: Validate public safety

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  public-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reject private paths and sensitive values
        run: python3 scripts/validate-public-safety.py
