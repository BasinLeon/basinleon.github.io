title: "Leon Basin Operator Journal"
description: "Public intelligence layer for GTM systems, revenue architecture, writing, and operator workflows."
theme: minima
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/
timezone: America/Los_Angeles
lang: en-US

# Deployed URL for the public journal
url: "https://basinleon.github.io"
baseurl: "/docs"

author: "Leon Basin"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

header_pages:
  - start-here.md
  - frameworks.md
  - topics.md
  - best-of.md
  - literary.md
  - about.md

show_excerpts: true

twitter:
  username: leonbasin
  card: summary_large_image

social:
  name: Leon Basin
  links:
    - https://linkedin.com/in/leonbasin
    - https://github.com/BasinLeon
    - https://basinleon.github.io

defaults:
  - scope:
      path: ""
      type: posts
    values:
      author: Leon Basin
      layout: post

# Optional analytics (set one)
# google_analytics: "G-XXXXXXXXXX"
google_analytics: ""
# plausible_domain: "basinleon.github.io"
plausible_domain: "basinleon.github.io"

# Optional search verification tags
webmaster_verifications:
  # google: "paste-google-verification-token"
  google: "google37a0ebe37d3d9375"
  # bing: "paste-bing-verification-token"
  bing: "FAAA69DB8614C8A24319E76A9621F68F"
