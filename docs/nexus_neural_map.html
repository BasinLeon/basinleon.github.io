<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basin::Nexus // NEURAL_MAP v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --panel: rgba(10, 10, 15, 0.95);
            --nexus-gold: #D4AF37;
            --nexus-gold-soft: rgba(212, 175, 55, 0.2);
            --accent: #1F6A5C;
            --accent-soft: rgba(31, 106, 92, 0.2);
            --text: #f8fafc;
            --muted: #64748b;
            --line: rgba(255, 255, 255, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
        }

        .starfield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--line) 1px, transparent 1px);
            background-size: 60px 60px; opacity: 0.4; z-index: 0;
        }

        header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 24px 30px;
            display: flex; justify-content: space-between; align-items: start;
            z-index: 100; backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--line);
        }

        .logo-group h1 {
            font-family: 'Outfit', sans-serif; font-weight: 850; font-size: 1.3rem;
            letter-spacing: 0.1em; color: var(--nexus-gold);
        }
        .eyebrow {
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted);
            margin-bottom: 4px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--line);
            padding: 8px 16px; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .back-btn:hover { background: var(--nexus-gold); color: #000; }

        #map-viewport {
            width: 100vw; height: 100vh; position: relative;
            cursor: move; transform-origin: center;
        }

        .galaxy-center {
            position: absolute; top: 50%; left: 50%; width: 1px; height: 1px;
        }

        .node {
            position: absolute; width: 8px; height: 8px; border-radius: 50%;
            background: var(--nexus-gold); cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform: translate(-50%, -50%); z-index: 10;
        }
        .node:hover { transform: translate(-50%, -50%) scale(2.5); z-index: 20; }
        .node.hot { box-shadow: 0 0 15px var(--nexus-gold); width: 10px; height: 10px; }
        .node.strike-target { 
            background: #ef4444; 
            width: 14px; height: 14px; 
            box-shadow: 0 0 20px #ef4444; 
            animation: pulse 2s infinite;
            z-index: 30;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .node.in-pipeline { background: var(--text); border: 2px solid var(--accent); }
        .node.stale { background: #ef4444; }

        .node-label {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: #fff; background: rgba(0,0,0,0.85);
            padding: 2px 8px; border-radius: 4px; border: 1px solid var(--line);
            white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .node:hover .node-label { opacity: 1; }

        .connection {
            position: absolute; background: var(--nexus-gold); height: 0.5px;
            opacity: 0.05; pointer-events: none; transform-origin: left center;
        }

        .hud-panel {
            position: absolute; bottom: 30px; right: 30px; width: 340px;
            background: var(--panel); border: 1px solid var(--line);
            border-radius: 16px; padding: 20px; z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(20px);
        }
        .hud-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
        .hud-title { font-family: 'Outfit', sans-serif; font-size: 1.1rem; color: var(--nexus-gold); margin: 4px 0 12px; font-weight: 700; }
        .hud-copy { font-size: 0.78rem; color: var(--text); line-height: 1.5; opacity: 0.8; }
        
        .hud-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
        .stat-box { border: 1px solid var(--line); padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.02); }
        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; }
        .stat-lab { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

        .cluster-label {
            position: absolute; font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: 1.5rem; color: var(--line); pointer-events: none;
            opacity: 0.2; text-transform: uppercase; letter-spacing: 0.1em;
        }

        .controls {
            position: absolute; bottom: 30px; left: 30px; display: flex; gap: 12px; z-index: 200;
        }
        .btn-ctrl {
            background: rgba(0,0,0,0.7); border: 1px solid var(--line); color: var(--text);
            padding: 10px 18px; border-radius: 10px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .btn-ctrl:hover { border-color: var(--nexus-gold); }

        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--nexus-gold); color: #000; padding: 10px 20px;
            border-radius: 8px; font-size: 0.8rem; font-weight: 700; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none;
        }
    </style>
    <script src="../data/preloaded-contacts.js"></script>
    <script src="../data/master-contacts.js"></script>
    <script src="../data/linkedin-signals.js"></script>
    <script src="../data/linkedin-message-layer.js"></script>
</head>
<body>
    <div class="starfield"></div>
    <div class="toast" id="toast"></div>

    <header>
        <div class="logo-group">
            <div class="eyebrow">Neural Recall Engine v2.0</div>
            <h1>BASIN::NEXUS // NEURAL_MAP</h1>
        </div>
        <button class="back-btn" onclick="window.history.back()">Back to Operator</button>
    </header>

    <div id="map-viewport">
        <div class="galaxy-center" id="galaxy"></div>
    </div>

    <div class="hud-panel" id="intelPanel" style="display: none;">
        <div class="hud-label" id="panelLabel">Node Intelligence</div>
        <div class="hud-title" id="panelTitle">...</div>
        <p class="hud-copy" id="panelDesc"></p>
        <div class="hud-stats">
            <div class="stat-box">
                <div class="stat-val" id="statSignal">0/10</div>
                <div class="stat-lab">Signal</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="statType">-</div>
                <div class="stat-lab">Class</div>
            </div>
            <div class="stat-box" style="border-color: #ef4444; grid-column: span 2;">
                <div class="stat-val" id="mapStrikeCount" style="color: #ef4444;">0</div>
                <div class="stat-lab" style="color: #ef4444;">Active Strike Targets in View</div>
            </div>
        </div>
        <button id="addBtn" style="width: 100%; margin-top: 16px; padding: 12px; background: var(--nexus-gold); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 0.75rem;">Push to Operator Desk</button>
    </div>

    <div class="controls">
        <button class="btn-ctrl" onclick="arrangeGalaxy()">⚡ Resync Topology</button>
        <button class="btn-ctrl" id="toggleLabels">👁 Toggle Labels</button>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 12px;" id="mapStatus">Ready. Indexed 0 nodes.</div>
    </div>

    <script>
        let NODES = [];
        let PIPELINE = new Set();
        let showLabels = false;

        function init() {
            // Load live data from global script variables
            try {
                const sample = (typeof PRELOADED_CONTACTS !== 'undefined') ? PRELOADED_CONTACTS : [];
                const master = (typeof MASTER_CONTACTS !== 'undefined') ? MASTER_CONTACTS : [];
                const linkedinSignals = (typeof LINKEDIN_SIGNAL_CONTACTS !== 'undefined') ? LINKEDIN_SIGNAL_CONTACTS : [];
                const linkedinMessages = (typeof LINKEDIN_MESSAGE_LAYER !== 'undefined' && Array.isArray(LINKEDIN_MESSAGE_LAYER.contacts)) ? LINKEDIN_MESSAGE_LAYER.contacts : [];
                // Merge and slice to avoid browser crash with 33k div elements
                NODES = [...linkedinSignals, ...linkedinMessages, ...sample, ...master].slice(0, 2000); 
            } catch (e) { console.error(e); }

            // Load pipeline state
            const localRows = JSON.parse(localStorage.getItem('lbs_operator_local_rows') || '[]');
            localRows.forEach(r => {
                if(r.account) PIPELINE.add(r.account.toLowerCase());
                if(r.contact) PIPELINE.add(r.contact.split('·')[0].trim().toLowerCase());
            });

            const linked = (typeof LINKEDIN_SIGNAL_SUMMARY !== 'undefined')
                ? ` LINKEDIN OVERLAPS ${LINKEDIN_SIGNAL_SUMMARY.targetCompanyOverlaps}.`
                : '';
            const msg = (typeof LINKEDIN_MESSAGE_LAYER !== 'undefined')
                ? ` MSG LAYER ${LINKEDIN_MESSAGE_LAYER.count}.`
                : '';
            document.getElementById('mapStatus').innerText = `CALIBRATED. INDEXED ${NODES.length} NODES.${linked}${msg}`;
            arrangeGalaxy();
        }

        function arrangeGalaxy() {
            const galaxy = document.getElementById('galaxy');
            galaxy.innerHTML = '';
            
            const industries = [...new Set(NODES.map(n => n.company || 'Unknown'))].slice(0, 12);
            const radiusScale = Math.min(window.innerWidth, window.innerHeight) * 0.35;

            // Simple clustering by industry/company
            NODES.forEach((node, i) => {
                const el = document.createElement('div');
                el.className = 'node';
                if (node.signalScore >= 8) el.classList.add('hot');
                
                const nameLower = node.name.toLowerCase();
                const companyLower = (node.company || '').toLowerCase();
                const inPipeline = PIPELINE.has(nameLower) || PIPELINE.has(companyLower);
                
                // STRIKE AWARENESS
                const strikeCompanies = ["edsights", "heygen", "monarch", "bounty", "scaleagentic"];
                const strikeNames = ["victor kovalev", "scott martinis", "michael maccariello", "brooke salyer", "rayan dabbagh"];
                const isStrike = strikeCompanies.some(s => companyLower.includes(s)) || 
                                 strikeNames.some(s => nameLower.includes(s));

                if (isStrike && !inPipeline) el.classList.add('strike-target');
                if (inPipeline) el.classList.add('in-pipeline');

                // Determine position
                const clusterIdx = industries.indexOf(node.company) % 12;
                const angle = (clusterIdx / 12) * Math.PI * 2;
                const jitter = (Math.random() - 0.5) * 100;
                const dist = radiusScale + (Math.random() * 150);
                
                const x = Math.cos(angle) * dist + jitter;
                const y = Math.sin(angle) * dist + jitter;

                el.style.left = x + 'px';
                el.style.top = y + 'px';

                const label = document.createElement('div');
                label.className = 'node-label';
                label.innerText = `${node.name} @ ${node.company}`;
                el.appendChild(label);

                el.onclick = () => showIntel(node, inPipeline);
                galaxy.appendChild(el);
            });

            // Update Global HUD
            const strikeCount = document.querySelectorAll('.node.strike-target').length;
            document.getElementById('mapStrikeCount').innerText = strikeCount;
            if (strikeCount > 0) {
                document.getElementById('mapStatus').innerText = `CRITICAL: ${strikeCount} STRIKE TARGETS DETECTED IN TOPOLOGY.`;
                document.getElementById('mapStatus').style.color = '#ef4444';
            }
            // Draw cluster names
            industries.forEach((ind, i) => {
                const angle = (i / 12) * Math.PI * 2;
                const x = Math.cos(angle) * (radiusScale + 250);
                const y = Math.sin(angle) * (radiusScale + 250);
                
                const l = document.createElement('div');
                l.className = 'cluster-label';
                l.innerText = ind;
                l.style.left = x + 'px';
                l.style.top = y + 'px';
                l.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
                galaxy.appendChild(l);
            });
        }

        function showIntel(node, inPipeline) {
            const panel = document.getElementById('intelPanel');
            panel.style.display = 'block';
            document.getElementById('panelTitle').innerText = node.name;
            document.getElementById('panelDesc').innerText = node.notes || "No additional context available for this node.";
            document.getElementById('statSignal').innerText = `${node.signalScore}/10`;
            document.getElementById('statType').innerText = node.type || "Contact";
            document.getElementById('panelLabel').innerText = node.source === "linkedin-export-2026-03-12"
                ? "LinkedIn Signal Node"
                : "Node Intelligence";
            
            const addBtn = document.getElementById('addBtn');
            if (inPipeline) {
                addBtn.innerText = "ALREADY IN PIPELINE";
                addBtn.style.opacity = 0.5;
                addBtn.onclick = null;
            } else {
                addBtn.innerText = "PUSH TO OPERATOR DESK";
                addBtn.style.opacity = 1;
                addBtn.onclick = () => addToDesk(node);
            }
        }

        function addToDesk(node) {
            const rows = JSON.parse(localStorage.getItem('lbs_operator_local_rows') || '[]');
            rows.push({
                id: `node-${Date.now()}`,
                account: node.company,
                contact: `${node.name} · ${node.role || 'Contact'}`,
                type: node.type || "Networking",
                stage: "Open",
                lastTouch: new Date().toISOString().slice(0, 10),
                nextStep: "Initial reachout via Neural Map signal",
                notes: node.notes,
                pipelineValue: 0, probability: 50, aiNextAction: ""
            });
            localStorage.setItem('lbs_operator_local_rows', JSON.stringify(rows));
            
            const toast = document.getElementById('toast');
            toast.innerText = `${node.name} sent to Operator Desk`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
            
            PIPELINE.add(node.name.toLowerCase());
            if(node.company) PIPELINE.add(node.company.toLowerCase());
            arrangeGalaxy();
            showIntel(node, true);
        }

        document.getElementById('toggleLabels').onclick = () => {
            showLabels = !showLabels;
            document.querySelectorAll('.node-label').forEach(l => l.style.opacity = showLabels ? 1 : 0);
        }

        init();
    </script>
</body>
</html>
